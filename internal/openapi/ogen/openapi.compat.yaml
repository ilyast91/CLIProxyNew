components:
    responses:
        BadRequest:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
            description: Некорректное тело запроса
        Forbidden:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
            description: Доступ запрещён (роль, статус пользователя)
        InternalError:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
            description: Внутренняя ошибка
        NotFound:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
            description: Ресурс не найден
        Unauthorized:
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
            description: Не авторизован
    schemas:
        APIKey:
            properties:
                created_at:
                    format: date-time
                    type: string
                expires_at:
                    format: date-time
                    nullable: true
                    type: string
                id:
                    format: int64
                    type: integer
                last_used_at:
                    format: date-time
                    nullable: true
                    type: string
                name:
                    type: string
                prefix:
                    description: Отображаемый префикс ключа; полный ключ не возвращается.
                    type: string
                scope:
                    nullable: true
                    oneOf:
                        - additionalProperties: true
                          type: object
                        - items: {}
                          type: array
                status:
                    enum:
                        - active
                        - revoked
                    type: string
            required:
                - id
                - prefix
                - name
                - status
                - created_at
            type: object
        APIKeyListResponse:
            properties:
                data:
                    items:
                        $ref: '#/components/schemas/APIKey'
                    type: array
            required:
                - data
            type: object
        AccountQuotaResponse:
            properties:
                account_id:
                    type: string
                antigravity_credits:
                    $ref: '#/components/schemas/AntigravityCredits'
                expires_at:
                    format: date-time
                    type: string
                provider:
                    type: string
                quota:
                    $ref: '#/components/schemas/UpstreamQuota'
            required:
                - account_id
                - provider
                - quota
            type: object
        AccountTestResponse:
            properties:
                error:
                    description: Безопасное описание невалидной credential без upstream response body.
                    type: string
                expires_at:
                    format: date-time
                    type: string
                last_refreshed_at:
                    format: date-time
                    type: string
                method:
                    enum:
                        - refresh
                        - http_probe
                    type: string
                quota:
                    $ref: '#/components/schemas/UpstreamQuota'
                status_code:
                    maximum: 599
                    minimum: 100
                    type: integer
                valid:
                    type: boolean
            required:
                - valid
                - method
                - quota
            type: object
        AdminAPIKey:
            allOf:
                - $ref: '#/components/schemas/APIKey'
                - properties:
                    owner_identity_source:
                        enum:
                            - ldap
                            - static
                        type: string
                    owner_status:
                        enum:
                            - active
                            - blocked
                        type: string
                    owner_username:
                        type: string
                    user_id:
                        format: int64
                        type: integer
                  required:
                    - user_id
                    - owner_username
                    - owner_identity_source
                    - owner_status
                  type: object
        AdminAPIKeyListResponse:
            properties:
                data:
                    items:
                        $ref: '#/components/schemas/AdminAPIKey'
                    type: array
            required:
                - data
            type: object
        AdminUser:
            properties:
                created_at:
                    format: date-time
                    type: string
                email:
                    type: string
                id:
                    format: int64
                    type: integer
                identity_source:
                    enum:
                        - ldap
                        - static
                    type: string
                role:
                    enum:
                        - user
                        - admin
                    type: string
                status:
                    enum:
                        - active
                        - blocked
                    type: string
                updated_at:
                    format: date-time
                    type: string
                username:
                    type: string
            required:
                - id
                - username
                - email
                - role
                - status
                - identity_source
                - created_at
                - updated_at
            type: object
        AdminUserListResponse:
            properties:
                data:
                    items:
                        $ref: '#/components/schemas/AdminUser'
                    type: array
            required:
                - data
            type: object
        AntigravityCredits:
            properties:
                available:
                    type: boolean
                credit_amount:
                    type: number
                known:
                    type: boolean
                min_credit_amount:
                    type: number
                paid_tier_id:
                    type: string
                updated_at:
                    format: date-time
                    type: string
            required:
                - known
                - available
            type: object
        CreateAPIKeyRequest:
            properties:
                expires_at:
                    format: date-time
                    nullable: true
                    type: string
                name:
                    description: Необязательная пользовательская метка ключа.
                    type: string
                scope:
                    nullable: true
                    oneOf:
                        - additionalProperties: true
                          type: object
                        - items: {}
                          type: array
            type: object
        CreateAPIKeyResponse:
            properties:
                api_key:
                    $ref: '#/components/schemas/APIKey'
                key:
                    description: Полное значение ключа; показывается только в этом ответе.
                    type: string
            required:
                - api_key
                - key
            type: object
        CreateProviderKeysRequest:
            properties:
                accounts:
                    items:
                        $ref: '#/components/schemas/ProviderAPIKeyAccount'
                    maxItems: 100
                    minItems: 1
                    type: array
            required:
                - accounts
            type: object
        CurrentUserResponse:
            properties:
                role:
                    enum:
                        - user
                        - admin
                    type: string
                user_id:
                    format: int64
                    type: integer
            required:
                - user_id
                - role
            type: object
        Error:
            properties:
                error:
                    properties:
                        code:
                            type: string
                        message:
                            type: string
                        type:
                            type: string
                    required:
                        - message
                    type: object
            required:
                - error
            type: object
        ImportedOAuthCredential:
            properties:
                email:
                    type: string
                id:
                    type: string
                provider:
                    type: string
            required:
                - id
                - provider
                - email
            type: object
        LoginRequest:
            properties:
                password:
                    format: password
                    minLength: 1
                    type: string
                username:
                    minLength: 1
                    type: string
            required:
                - username
                - password
            type: object
        LoginResponse:
            properties:
                expires_at:
                    format: date-time
                    type: string
                role:
                    enum:
                        - user
                        - admin
                    type: string
                user_id:
                    format: int64
                    type: integer
            required:
                - user_id
                - role
                - expires_at
            type: object
        ModelOverride:
            properties:
                config: {}
                enabled:
                    type: boolean
                id:
                    format: int64
                    type: integer
                model_alias:
                    type: string
                provider:
                    type: string
                upstream_model:
                    type: string
            required:
                - id
                - provider
                - model_alias
                - upstream_model
                - enabled
            type: object
        ModelOverrideListResponse:
            properties:
                data:
                    items:
                        $ref: '#/components/schemas/ModelOverride'
                    type: array
            required:
                - data
            type: object
        OAuthCredential:
            properties:
                attributes:
                    additionalProperties:
                        type: string
                    type: object
                created_at:
                    format: date-time
                    type: string
                disabled:
                    type: boolean
                id:
                    description: Runtime ID из export игнорируется при import; новый ID назначает coreauth.Manager.
                    type: string
                label:
                    type: string
                last_refreshed_at:
                    format: date-time
                    type: string
                metadata:
                    additionalProperties: true
                    description: Полные OAuth credentials, включая refresh/access token; секретное содержимое.
                    type: object
                next_refresh_after:
                    format: date-time
                    type: string
                provider:
                    type: string
                proxy_url:
                    type: string
                status:
                    type: string
                updated_at:
                    format: date-time
                    type: string
            required:
                - provider
                - attributes
                - metadata
            type: object
        OAuthSession:
            properties:
                auth_id:
                    type: string
                created_at:
                    format: date-time
                    type: string
                error_message:
                    type: string
                expires_at:
                    format: date-time
                    type: string
                flow_type:
                    enum:
                        - callback
                        - device
                    type: string
                provider:
                    type: string
                state:
                    type: string
                status:
                    enum:
                        - pending
                        - completed
                        - error
                        - cancelled
                    type: string
                updated_at:
                    format: date-time
                    type: string
                user_code:
                    description: Отображаемый код device flow; не является device_code.
                    type: string
            required:
                - state
                - provider
                - flow_type
                - status
                - expires_at
                - created_at
                - updated_at
            type: object
        OAuthSessionListResponse:
            properties:
                data:
                    items:
                        $ref: '#/components/schemas/OAuthSession'
                    type: array
            required:
                - data
            type: object
        ProviderAPIKey:
            properties:
                id:
                    description: Идентификатор, назначенный coreauth.Manager.
                    type: string
                label:
                    type: string
                provider:
                    type: string
            required:
                - id
                - provider
            type: object
        ProviderAPIKeyAccount:
            properties:
                api_key:
                    description: Upstream API-key; шифруется в credential store и никогда не возвращается.
                    minLength: 1
                    type: string
                    writeOnly: true
                base_url:
                    description: Необязательный HTTP(S) base URL для OpenAI-compatible провайдера.
                    format: uri
                    type: string
                label:
                    description: Необязательная метка upstream-аккаунта.
                    type: string
                provider:
                    minLength: 1
                    type: string
            required:
                - provider
                - api_key
            type: object
        ProviderAPIKeyListResponse:
            properties:
                data:
                    items:
                        $ref: '#/components/schemas/ProviderAPIKey'
                    type: array
            required:
                - data
            type: object
        SetUserStatusRequest:
            properties:
                status:
                    enum:
                        - active
                        - blocked
                    type: string
            required:
                - status
            type: object
        UpsertModelOverrideRequest:
            properties:
                config: {}
                enabled:
                    type: boolean
                provider:
                    type: string
                upstream_model:
                    type: string
            required:
                - provider
                - upstream_model
                - enabled
            type: object
        UpstreamQuota:
            properties:
                backoff_level:
                    minimum: 0
                    type: integer
                exceeded:
                    type: boolean
                next_recover_at:
                    format: date-time
                    type: string
                reason:
                    type: string
                unknown:
                    description: Квота ещё не наблюдалась в inference-вызовах.
                    type: boolean
            required:
                - exceeded
                - unknown
            type: object
        UsageAPIKeySummary:
            properties:
                api_key_id:
                    format: int64
                    type: integer
                failed_request_count:
                    format: int64
                    type: integer
                request_count:
                    format: int64
                    type: integer
                total_tokens:
                    format: int64
                    type: integer
            required:
                - api_key_id
                - request_count
                - failed_request_count
                - total_tokens
            type: object
        UsageModelSummary:
            properties:
                failed_request_count:
                    format: int64
                    type: integer
                model:
                    type: string
                request_count:
                    format: int64
                    type: integer
                total_tokens:
                    format: int64
                    type: integer
            required:
                - model
                - request_count
                - failed_request_count
                - total_tokens
            type: object
        UsageResponse:
            properties:
                by_api_key:
                    items:
                        $ref: '#/components/schemas/UsageAPIKeySummary'
                    type: array
                by_model:
                    items:
                        $ref: '#/components/schemas/UsageModelSummary'
                    type: array
                cached_tokens:
                    format: int64
                    type: integer
                failed_request_count:
                    format: int64
                    type: integer
                from:
                    format: date-time
                    type: string
                input_tokens:
                    format: int64
                    type: integer
                output_tokens:
                    format: int64
                    type: integer
                reasoning_tokens:
                    format: int64
                    type: integer
                request_count:
                    format: int64
                    type: integer
                to:
                    format: date-time
                    type: string
                total_tokens:
                    format: int64
                    type: integer
            required:
                - from
                - to
                - request_count
                - failed_request_count
                - input_tokens
                - output_tokens
                - reasoning_tokens
                - cached_tokens
                - total_tokens
                - by_model
                - by_api_key
            type: object
    securitySchemes:
        BearerApiKey:
            bearerFormat: API-key
            description: Long-lived API-key (как у OpenAI), проверяется через access.Provider (R2).
            scheme: bearer
            type: http
        SessionCookie:
            description: Opaque session-токен, устанавливается после login через настроенный identity source (R1.2).
            in: cookie
            name: cliproxy_session
            type: apiKey
info:
    contact:
        name: CLIProxyNew
        url: https://github.com/ilyast91/CLIProxyNew
    description: |
        Бизнес-обвязка над upstream relay-движком CLIProxyAPI v7.

        - Management-API (`/api/v1/*`) — авторизация, управление API-keys,
          настройка провайдеров, OAuth login-flow, тестирование аккаунтов.
        - Прокси-API (`/v1/*`) — OpenAI/Gemini/Claude/Codex/Grok-совместимые
          эндпоинты, проксируются ядру.
        - Системные роуты — health, metrics, спецификация.

        См. docs/requirements.md, docs/architecture.md.
    license:
        name: TBD
    title: CLIProxyNew API
    version: 0.1.0
openapi: 3.1.0
paths:
    /api/v1/admin/accounts/{accountID}/quota:
        get:
            description: Возвращает реактивный quota snapshot ядра и, для Antigravity, последний public credits hint. `unknown=true` означает отсутствие наблюдавшихся inference quota-данных, а не доступность квоты.
            operationId: getUpstreamAccountQuota
            parameters:
                - in: path
                  name: accountID
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AccountQuotaResponse'
                    description: Runtime-квота upstream аккаунта
                "401":
                    $ref: '#/components/responses/Unauthorized'
                "403":
                    $ref: '#/components/responses/Forbidden'
                "404":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                    description: Upstream account не найден
                "500":
                    $ref: '#/components/responses/InternalError'
            security:
                - SessionCookie: []
            summary: Просмотреть runtime-квоту upstream аккаунта
            tags:
                - Admin
    /api/v1/admin/accounts/{accountID}/test:
        post:
            description: Проверяет OAuth через refresh-token либо API-key через metadata endpoint провайдера. Inference и CountTokens не вызываются; невалидная credential возвращает `200` с `valid=false`.
            operationId: testUpstreamAccount
            parameters:
                - in: path
                  name: accountID
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AccountTestResponse'
                    description: Результат проверки
                "400":
                    $ref: '#/components/responses/BadRequest'
                "401":
                    $ref: '#/components/responses/Unauthorized'
                "403":
                    $ref: '#/components/responses/Forbidden'
                "404":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                    description: Upstream account не найден
                "500":
                    $ref: '#/components/responses/InternalError'
            security:
                - SessionCookie: []
            summary: Проверить upstream credential
            tags:
                - Admin
    /api/v1/admin/keys:
        get:
            description: Возвращает безопасные metadata ключей и их владельцев. Полные ключи и bcrypt-хэши не раскрываются.
            operationId: listAllAPIKeys
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/AdminAPIKeyListResponse'
                    description: API-ключи пользователей
                "401":
                    $ref: '#/components/responses/Unauthorized'
                "403":
                    $ref: '#/components/responses/Forbidden'
                "500":
                    $ref: '#/components/responses/InternalError'
            security:
                - SessionCookie: []
            summary: Список всех пользовательских API-ключей
            tags:
                - Admin
    /api/v1/admin/models:
        get:
            description: Возвращает allow-list и provider selection metadata моделей. Поле upstream_model хранит desired mapping до появления публичного SDK hook для rewrite downstream model.
            operationId: listModelOverrides
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ModelOverrideListResponse'
                    description: Model overrides
            security:
                - SessionCookie: []
            summary: Список model overrides
            tags:
                - Admin
    /api/v1/admin/models/{modelAlias}:
        delete:
            description: Удаление записывается в admin audit log.
            operationId: deleteModelOverride
            parameters:
                - in: path
                  name: modelAlias
                  required: true
                  schema:
                    type: string
            responses:
                "204":
                    description: Override удалён
            security:
                - SessionCookie: []
            summary: Удалить model override
            tags:
                - Admin
        put:
            description: Изменение записывается в admin audit log.
            operationId: upsertModelOverride
            parameters:
                - in: path
                  name: modelAlias
                  required: true
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/UpsertModelOverrideRequest'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ModelOverride'
                    description: Override сохранён
            security:
                - SessionCookie: []
            summary: Создать или обновить model override
            tags:
                - Admin
    /api/v1/admin/oauth/accounts/{accountID}/export:
        get:
            description: Отдаёт attachment с полным OAuth credential JSON. Файл содержит access/refresh tokens и должен обрабатываться как секрет; действие записывается в admin audit log.
            operationId: exportOAuthCredential
            parameters:
                - in: path
                  name: accountID
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/OAuthCredential'
                    description: Полный OAuth credential attachment
                    headers:
                        Content-Disposition:
                            schema:
                                type: string
                "400":
                    $ref: '#/components/responses/BadRequest'
                "401":
                    $ref: '#/components/responses/Unauthorized'
                "403":
                    $ref: '#/components/responses/Forbidden'
                "404":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                    description: OAuth account не найден
                "500":
                    $ref: '#/components/responses/InternalError'
            security:
                - SessionCookie: []
            summary: Экспортировать OAuth credential
            tags:
                - Admin
    /api/v1/admin/oauth/import:
        post:
            description: Импортирует один полный OAuth credential JSON. Дубликат `provider+email` отклоняется; внешний ID игнорируется, новый ID назначает coreauth.Manager. Действие пишется в admin audit log без токенов.
            operationId: importOAuthCredential
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/OAuthCredential'
                required: true
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ImportedOAuthCredential'
                    description: OAuth credential импортирован
                "400":
                    $ref: '#/components/responses/BadRequest'
                "401":
                    $ref: '#/components/responses/Unauthorized'
                "403":
                    $ref: '#/components/responses/Forbidden'
                "409":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
                    description: OAuth credential с таким provider и email уже существует
                "500":
                    $ref: '#/components/responses/InternalError'
            security:
                - SessionCookie: []
            summary: Импортировать OAuth credential
            tags:
                - Admin
    /api/v1/admin/oauth/sessions:
        get:
            description: Возвращает pending OAuth-сессии без PKCE verifier и device code.
            operationId: listPendingOAuthSessions
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/OAuthSessionListResponse'
                    description: OAuth-сессии без PKCE/device секретов
                "401":
                    $ref: '#/components/responses/Unauthorized'
                "403":
                    $ref: '#/components/responses/Forbidden'
            security:
                - SessionCookie: []
            summary: Pending OAuth-сессии
            tags:
                - Admin
    /api/v1/admin/oauth/sessions/{state}:
        delete:
            description: Отменяет pending OAuth-flow и записывает действие в admin audit log.
            operationId: cancelOAuthSession
            parameters:
                - in: path
                  name: state
                  required: true
                  schema:
                    type: string
            responses:
                "204":
                    description: Flow отменён
                "404":
                    description: Pending OAuth-сессия не найдена
            security:
                - SessionCookie: []
            summary: Отменить OAuth-сессию
            tags:
                - Admin
        get:
            description: Возвращает статус OAuth-flow без PKCE verifier и device code.
            operationId: getOAuthSession
            parameters:
                - in: path
                  name: state
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/OAuthSession'
                    description: Статус OAuth-сессии
                "404":
                    description: OAuth-сессия не найдена
            security:
                - SessionCookie: []
            summary: Статус OAuth-сессии
            tags:
                - Admin
    /api/v1/admin/providers/keys:
        post:
            description: Регистрирует до 100 статических upstream credentials через public SDK manager. Каждый credential шифруется в Store и записывается в admin audit log; ключи не возвращаются.
            operationId: createProviderAPIKeys
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/CreateProviderKeysRequest'
                required: true
            responses:
                "201":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ProviderAPIKeyListResponse'
                    description: Upstream credentials зарегистрированы
                "400":
                    $ref: '#/components/responses/BadRequest'
                "401":
                    $ref: '#/components/responses/Unauthorized'
                "403":
                    $ref: '#/components/responses/Forbidden'
                "500":
                    $ref: '#/components/responses/InternalError'
            security:
                - SessionCookie: []
            summary: Зарегистрировать upstream API-keys
            tags:
                - Admin
