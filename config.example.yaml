# CLIProxyNew — пример конфигурации (R6).
# Реальный config.yaml монтируется из k8s ConfigMap. Секреты — только из env.
# Копируйте как config.yaml для локальной разработки.

server:
  addr: ":8080"           # сетевой интерфейс и порт
  environment: "production" # development | test | production
  # Явный allow-list для browser management API; пустой список отключает CORS.
  cors_allowed_origins: [] # например ["https://console.corp.example"]

auth:
  mode: "ldap"             # ldap | static; static разрешён только вне production
  # Для static mode нужны env: CLIPROXY_STATIC_USER_USERNAME,
  # CLIPROXY_STATIC_USER_PASSWORD, CLIPROXY_STATIC_USER_ROLE (user | admin).

db:
  dsn: "postgres://cliproxy@localhost:5432/cliproxy?sslmode=disable"
  # пароль — из env DB_PASSWORD (подставляется в DSN через pgxpassfile или
  # переменную окружения; см. .env.example)

ldap:
  url: "ldaps://ldap.corp.example.com"   # LDAP/AD, обязательно TLS
  bind_dn: "CN=svc-cliproxy,OU=Service,DC=corp,DC=example"
  # bind пароль — из env LDAP_BIND_PASSWORD
  user_base: "OU=Users,DC=corp,DC=example"
  user_filter: "(sAMAccountName={username})"
  user_group_dn: "CN=cliproxy-users,OU=Groups,DC=corp,DC=example"
  admin_group_dn: "CN=cliproxy-admins,OU=Groups,DC=corp,DC=example"

logging:
  level: "info"            # debug | info | warn | error
  format: "json"           # json | text

encryption:
  key_version: 1           # активная версия мастер-ключа (сам ключ — env)
