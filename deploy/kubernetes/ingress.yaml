apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cliproxy
  labels:
    app.kubernetes.io/name: cliproxy
    app.kubernetes.io/component: api
spec:
  ingressClassName: nginx
  rules:
    - host: cliproxy.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cliproxy
                port:
                  name: http
