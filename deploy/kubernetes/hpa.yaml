apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cliproxy
  labels:
    app.kubernetes.io/name: cliproxy
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cliproxy
  minReplicas: 2
  maxReplicas: 10
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
