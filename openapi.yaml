  /api/v1/login:
    post:
      tags: [Auth]
      summary: Login через активный identity source
      description: |
        Проверяет credentials через LDAP либо static source согласно `auth.mode`.
        В ответ устанавливает opaque cookie; session-token не возвращается в JSON.
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login успешен; opaque session передана в cookie
          headers:
            Set-Cookie:
              description: HttpOnly opaque session-cookie `cliproxy_session`.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/logout:
    post:
      tags: [Auth]
      summary: Завершение management-сессии
      description: |
        Удаляет session-cookie, если она была передана, и всегда возвращает
        успешный ответ с инструкцией удалить cookie на клиенте.
      operationId: logout
      security: []
      responses:
        "204":
          description: Сессия завершена, cookie удалена
          headers:
            Set-Cookie:
              description: Инструкция удалить cookie `cliproxy_session`.
              schema:
                type: string

  /api/v1/me:
    get:
      tags: [User]
      summary: Текущий principal management-сессии
      description: Возвращает идентификатор и роль текущей management-сессии без раскрытия session cookie или token.
      operationId: getCurrentUser
      security:
        - SessionCookie: []
      responses:
        "200":
          description: Идентификатор и роль текущего пользователя
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/me/keys:
    get:
      tags: [User]
      summary: Список собственных API-ключей
      description: Возвращает только безопасные метаданные ключей текущего пользователя. Полный ключ и bcrypt-хэш не раскрываются.
      operationId: listMyAPIKeys
      security:
        - SessionCookie: []
      responses:
        "200":
          description: Метаданные API-ключей
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIKeyListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [User]
      summary: Выпустить API-ключ
      description: Создаёт ключ для текущего пользователя. Полное значение возвращается только в ответе `201` и в БД не хранится.
      operationId: createMyAPIKey
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAPIKeyRequest"
      responses:
        "201":
          description: Ключ выпущен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateAPIKeyResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/me/keys/{keyID}:
    delete:
      tags: [User]
      summary: Отозвать API-ключ
      description: Отзывает ключ, принадлежащий текущему пользователю.
      operationId: revokeMyAPIKey
      security:
        - SessionCookie: []
      parameters:
        - name: keyID
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "204":
          description: Ключ отозван
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Ключ не найден или не принадлежит текущему пользователю
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/me/usage:
    get:
      tags: [User]
      summary: Личная usage-статистика
      description: Возвращает агрегаты только текущего пользователя. Если `from` и `to` не переданы, используется последние 30 дней.
      operationId: getMyUsage
      security:
        - SessionCookie: []
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Личная usage-статистика
          content:
