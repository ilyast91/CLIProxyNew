  /api/v1/admin/oauth/sessions:
    get:
      tags: [Admin]
      summary: Pending OAuth-сессии
      description: Возвращает pending OAuth-сессии без PKCE verifier и device code.
      operationId: listPendingOAuthSessions
      security:
        - SessionCookie: []
      responses:
        "200": {description: OAuth-сессии без PKCE/device секретов, content: {application/json: {schema: {$ref: "#/components/schemas/OAuthSessionListResponse"}}}}
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/admin/oauth/sessions/{state}:
    get:
      tags: [Admin]
      summary: Статус OAuth-сессии
      description: Возвращает статус OAuth-flow без PKCE verifier и device code.
      operationId: getOAuthSession
      security: [{SessionCookie: []}]
      parameters: [{name: state, in: path, required: true, schema: {type: string}}]
      responses:
        "200": {description: Статус OAuth-сессии, content: {application/json: {schema: {$ref: "#/components/schemas/OAuthSession"}}}}
        "404": {description: OAuth-сессия не найдена}
    delete:
      tags: [Admin]
      summary: Отменить OAuth-сессию
      description: Отменяет pending OAuth-flow и записывает действие в admin audit log.
      operationId: cancelOAuthSession
      security:
        - SessionCookie: []
      parameters:
        - name: state
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Flow отменён
        "404":
          description: Pending OAuth-сессия не найдена

  /api/v1/admin/providers/keys:
    post:
      tags: [Admin]
      summary: Зарегистрировать upstream API-keys
      description: Регистрирует до 100 статических upstream credentials через public SDK manager. Каждый credential шифруется в Store и записывается в admin audit log; ключи не возвращаются.
      operationId: createProviderAPIKeys
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProviderKeysRequest"
      responses:
        "201":
          description: Upstream credentials зарегистрированы
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderAPIKeyListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/admin/accounts/{accountID}/test:
    post:
      tags: [Admin]
      summary: Проверить upstream credential
      description: Проверяет OAuth через refresh-token либо API-key через metadata endpoint провайдера. Inference и CountTokens не вызываются; невалидная credential возвращает `200` с `valid=false`.
      operationId: testUpstreamAccount
      security:
        - SessionCookie: []
      parameters:
        - name: accountID
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Результат проверки
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountTestResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Upstream account не найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/admin/accounts/{accountID}/quota:
    get:
      tags: [Admin]
      summary: Просмотреть runtime-квоту upstream аккаунта
      description: Возвращает реактивный quota snapshot ядра и, для Antigravity, последний public credits hint. `unknown=true` означает отсутствие наблюдавшихся inference quota-данных, а не доступность квоты.
      operationId: getUpstreamAccountQuota
      security:
        - SessionCookie: []
      parameters:
        - name: accountID
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Runtime-квота upstream аккаунта
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountQuotaResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Upstream account не найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/admin/oauth/accounts/{accountID}/export:
    get:
      tags: [Admin]
      summary: Экспортировать OAuth credential
      description: Отдаёт attachment с полным OAuth credential JSON. Файл содержит access/refresh tokens и должен обрабатываться как секрет; действие записывается в admin audit log.
      operationId: exportOAuthCredential
      security:
        - SessionCookie: []
      parameters:
        - name: accountID
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Полный OAuth credential attachment
          headers:
            Content-Disposition:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthCredential"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: OAuth account не найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/admin/oauth/import:
    post:
      tags: [Admin]
      summary: Импортировать OAuth credential
      description: Импортирует один полный OAuth credential размером до 1 MiB. Принимает JSON request body или JSON-файл в multipart-поле `file`. Дубликат `provider+email` отклоняется; внешний ID игнорируется, новый ID назначает coreauth.Manager. Действие пишется в admin audit log без токенов.
      operationId: importOAuthCredential
      security:
        - SessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OAuthCredential"
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: JSON-файл с полным OAuth credential, максимум 1 MiB
      responses:
        "201":
          description: OAuth credential импортирован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportedOAuthCredential"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: OAuth credential с таким provider и email уже существует
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "413":
          description: OAuth credential превышает лимит 1 MiB
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "415":
          description: Поддерживаются только application/json и multipart/form-data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/admin/models:
    get:
      tags: [Admin]
      summary: Список model overrides
      description: Возвращает allow-list и provider selection metadata моделей. Поле upstream_model хранит desired mapping до появления публичного SDK hook для rewrite downstream model.
      operationId: listModelOverrides
      security: [{SessionCookie: []}]
      responses:
        "200": {description: Model overrides, content: {application/json: {schema: {$ref: "#/components/schemas/ModelOverrideListResponse"}}}}
  /api/v1/admin/models/{modelAlias}:
    put:
      tags: [Admin]
      summary: Создать или обновить model override
      description: Изменение записывается в admin audit log.
      operationId: upsertModelOverride
      security: [{SessionCookie: []}]
      parameters: [{name: modelAlias, in: path, required: true, schema: {type: string}}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/UpsertModelOverrideRequest"}}}}
      responses:
        "200": {description: Override сохранён, content: {application/json: {schema: {$ref: "#/components/schemas/ModelOverride"}}}}
    delete:
      tags: [Admin]
      summary: Удалить model override
      description: Удаление записывается в admin audit log.
      operationId: deleteModelOverride
      security: [{SessionCookie: []}]
      parameters: [{name: modelAlias, in: path, required: true, schema: {type: string}}]
      responses:
        "204": {description: Override удалён}

