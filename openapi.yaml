# CLIProxyNew — OpenAPI 3.1 спецификация (R11).
#
# Spec-first: эта спецификация первична. Go-типы и хендлеры генерируются
# через ogen (см. docs/requirements.md R11.2).
#
# Структура:
#   /api/v1/*     — management-API (R9): логин, user/admin, OAuth, testing.
#                   С полными схемами request/response. Добавляются в Ф4.
#   /v1/*         — прокси-роуты (R8): chat/completions, messages, generateContent.
#                   Без body-схем (проксируются ядром). Только auth + errors.
#                   Добавляются в Ф3/Ф4.
#   /healthz,
#   /readyz,
#   /metrics,
#   /openapi.json,
#   /docs         — системные роуты (R6, R11). Описаны ниже.
#
# CI lint: spectral (github.com/stoplightio/spectral) + drift-check с кодом.

openapi: 3.1.0

info:
  title: CLIProxyNew API
  version: 0.1.0
  description: |
    Бизнес-обвязка над upstream relay-движком CLIProxyAPI v7.

    - Management-API (`/api/v1/*`) — авторизация, управление API-keys,
      настройка провайдеров, OAuth login-flow, тестирование аккаунтов.
    - Прокси-API (`/v1/*`) — OpenAI/Gemini/Claude/Codex/Grok-совместимые
      эндпоинты, проксируются ядру.
    - Системные роуты — health, metrics, спецификация.

    См. docs/requirements.md, docs/architecture.md.
  contact:
    name: CLIProxyNew
    url: https://github.com/ilyast91/CLIProxyNew
  license:
    name: TBD

servers:
  - url: /
    description: Relative (для работы за прокси/ingress)

# ───────────────────────────────────────────────────────────────────────────
# Теги для группировки эндпоинтов в Swagger UI.
# ───────────────────────────────────────────────────────────────────────────
tags:
  - name: System
    description: Системные роуты (health, metrics, docs)
  - name: Auth
    description: Login через настроенный identity source, session-cookie (R1)
  - name: User
    description: Пользовательские операции — свои API-keys, личная статистика (R9.U)
  - name: Admin
    description: Администраторские операции — настройка провайдеров, управление (R9.A)
  - name: Proxy
    description: Прокси-API (OpenAI/Gemini/Claude/...-совместимые) — делегируется ядру (R8)

# ───────────────────────────────────────────────────────────────────────────
# Глобальные схемы безопасности.
# ───────────────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    # Session-cookie — для management-API (R1, R9.G.1).
    SessionCookie:
      type: apiKey
      in: cookie
      name: cliproxy_session
      description: Opaque session-токен, устанавливается после login через настроенный identity source (R1.2).

    # Bearer API-key — для прокси-API (R2.1).
    BearerApiKey:
      type: http
      scheme: bearer
      bearerFormat: API-key
      description: Long-lived API-key (как у OpenAI), проверяется через access.Provider (R2).

  # Общий формат ошибок (OpenAI-compatible).
  responses:
    BadRequest:
      description: Некорректное тело запроса
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Не авторизован
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Доступ запрещён (роль, статус пользователя)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalError:
      description: Внутренняя ошибка
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    # Общий формат ошибки (OpenAI-compatible error envelope).
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [message]
          properties:
            message:
              type: string
            type:
              type: string
            code:
              type: string
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
          format: password
    LoginResponse:
      type: object
      required: [user_id, role, expires_at]
      properties:
        user_id:
          type: integer
          format: int64
        role:
          type: string
          enum: [user, admin]
        expires_at:
          type: string
          format: date-time
    CurrentUserResponse:
      type: object
      required: [user_id, role]
      properties:
        user_id:
          type: integer
          format: int64
        role:
          type: string
          enum: [user, admin]
    APIKey:
      type: object
      required: [id, prefix, name, status, created_at]
      properties:
        id:
          type: integer
          format: int64
        prefix:
          type: string
          description: Отображаемый префикс ключа; полный ключ не возвращается.
        name:
          type: string
        status:
          type: string
          enum: [active, revoked]
        expires_at:
          type: [string, "null"]
          format: date-time
        scope:
          type: [object, array, "null"]
          additionalProperties: true
          items: {}
        last_used_at:
          type: [string, "null"]
          format: date-time
        created_at:
          type: string
          format: date-time
    APIKeyListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/APIKey"
    CreateAPIKeyRequest:
      type: object
      properties:
        name:
          type: string
          description: Необязательная пользовательская метка ключа.
        expires_at:
          type: [string, "null"]
          format: date-time
        scope:
          type: [object, array, "null"]
          additionalProperties: true
          items: {}
    CreateAPIKeyResponse:
      type: object
      required: [api_key, key]
      properties:
        api_key:
          $ref: "#/components/schemas/APIKey"
        key:
          type: string
          description: Полное значение ключа; показывается только в этом ответе.
    UsageModelSummary:
      type: object
      required: [model, request_count, failed_request_count, total_tokens]
      properties:
        model:
          type: string
        request_count:
          type: integer
          format: int64
        failed_request_count:
          type: integer
          format: int64
        total_tokens:
          type: integer
          format: int64
    UsageAPIKeySummary:
      type: object
      required: [api_key_id, request_count, failed_request_count, total_tokens]
      properties:
        api_key_id:
          type: integer
          format: int64
        request_count:
          type: integer
          format: int64
        failed_request_count:
          type: integer
          format: int64
        total_tokens:
          type: integer
          format: int64
    UsageResponse:
      type: object
      required: [from, to, request_count, failed_request_count, input_tokens, output_tokens, reasoning_tokens, cached_tokens, total_tokens, by_model, by_api_key]
      properties:
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        request_count:
          type: integer
          format: int64
        failed_request_count:
          type: integer
          format: int64
        input_tokens:
          type: integer
          format: int64
        output_tokens:
          type: integer
          format: int64
        reasoning_tokens:
          type: integer
          format: int64
        cached_tokens:
          type: integer
          format: int64
        total_tokens:
          type: integer
          format: int64
        by_model:
          type: array
          items:
            $ref: "#/components/schemas/UsageModelSummary"
        by_api_key:
          type: array
          items:
            $ref: "#/components/schemas/UsageAPIKeySummary"
    AdminUser:
      type: object
      required: [id, username, email, role, status, identity_source, created_at, updated_at]
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, admin]
        status:
          type: string
          enum: [active, blocked]
        identity_source:
          type: string
          enum: [ldap, static]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AdminUserListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AdminUser"
    SetUserStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [active, blocked]
    AdminAPIKey:
      allOf:
        - $ref: "#/components/schemas/APIKey"
        - type: object
          required: [user_id, owner_username, owner_identity_source, owner_status]
          properties:
            user_id:
              type: integer
              format: int64
            owner_username:
              type: string
            owner_identity_source:
              type: string
              enum: [ldap, static]
            owner_status:
              type: string
              enum: [active, blocked]
    AdminAPIKeyListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AdminAPIKey"
    ModelOverride:
      type: object
      required: [id, provider, model_alias, upstream_model, enabled]
      properties:
        id: {type: integer, format: int64}
        provider: {type: string}
        model_alias: {type: string}
        upstream_model: {type: string}
        enabled: {type: boolean}
        config: {}
    ModelOverrideListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: {$ref: "#/components/schemas/ModelOverride"}
    UpsertModelOverrideRequest:
      type: object
      required: [provider, upstream_model, enabled]
      properties:
        provider: {type: string}
        upstream_model: {type: string}
        enabled: {type: boolean}
        config: {}
    OAuthSession:
      type: object
      required: [state, provider, flow_type, status, expires_at, created_at, updated_at]
      properties:
        state: {type: string}
        provider: {type: string}
        flow_type: {type: string, enum: [callback, device]}
        status: {type: string, enum: [pending, completed, error, cancelled]}
        auth_id: {type: string}
        error_message: {type: string}
        user_code: {type: string, description: Отображаемый код device flow; не является device_code.}
        expires_at: {type: string, format: date-time}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
    OAuthSessionListResponse:
      type: object
      required: [data]
      properties:
        data: {type: array, items: {$ref: "#/components/schemas/OAuthSession"}}
    ProviderAPIKeyAccount:
      type: object
      required: [provider, api_key]
      properties:
        provider:
          type: string
          minLength: 1
        api_key:
          type: string
          minLength: 1
          writeOnly: true
          description: Upstream API-key; шифруется в credential store и никогда не возвращается.
        base_url:
          type: string
          format: uri
          description: Необязательный HTTP(S) base URL для OpenAI-compatible провайдера.
        label:
          type: string
          description: Необязательная метка upstream-аккаунта.
    CreateProviderKeysRequest:
      type: object
      required: [accounts]
      properties:
        accounts:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: "#/components/schemas/ProviderAPIKeyAccount"
    ProviderAPIKey:
      type: object
      required: [id, provider]
      properties:
        id:
          type: string
          description: Идентификатор, назначенный coreauth.Manager.
        provider:
          type: string
        label:
          type: string
    ProviderAPIKeyListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ProviderAPIKey"
    UpstreamQuota:
      type: object
      required: [exceeded, unknown]
      properties:
        exceeded:
          type: boolean
        reason:
          type: string
        next_recover_at:
          type: string
          format: date-time
        backoff_level:
          type: integer
          minimum: 0
        unknown:
          type: boolean
          description: Квота ещё не наблюдалась в inference-вызовах.
    AntigravityCredits:
      type: object
      required: [known, available]
      properties:
        known:
          type: boolean
        available:
          type: boolean
        credit_amount:
          type: number
        min_credit_amount:
          type: number
        paid_tier_id:
          type: string
        updated_at:
          type: string
          format: date-time
    AccountQuotaResponse:
      type: object
      required: [account_id, provider, quota]
      properties:
        account_id:
          type: string
        provider:
          type: string
        expires_at:
          type: string
          format: date-time
        quota:
          $ref: "#/components/schemas/UpstreamQuota"
        antigravity_credits:
          $ref: "#/components/schemas/AntigravityCredits"
    OAuthCredential:
      type: object
      required: [provider, attributes, metadata]
      properties:
        id:
          type: string
          description: Runtime ID из export игнорируется при import; новый ID назначает coreauth.Manager.
        provider:
          type: string
        label:
          type: string
        status:
          type: string
        disabled:
          type: boolean
        proxy_url:
          type: string
        attributes:
          type: object
          additionalProperties:
            type: string
        metadata:
          type: object
          additionalProperties: true
          description: Полные OAuth credentials, включая refresh/access token; секретное содержимое.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        last_refreshed_at:
          type: string
          format: date-time
        next_refresh_after:
          type: string
          format: date-time
    ImportedOAuthCredential:
      type: object
      required: [id, provider, email]
      properties:
        id:
          type: string
        provider:
          type: string
        email:
          type: string
    AccountTestResponse:
      type: object
      required: [valid, method, quota]
      properties:
        valid:
          type: boolean
        method:
          type: string
          enum: [refresh, http_probe]
        status_code:
          type: integer
          minimum: 100
          maximum: 599
        expires_at:
          type: string
          format: date-time
        last_refreshed_at:
          type: string
          format: date-time
        quota:
          $ref: "#/components/schemas/UpstreamQuota"
        error:
          type: string
          description: Безопасное описание невалидной credential без upstream response body.

# ───────────────────────────────────────────────────────────────────────────
# Системные роуты (Ф0/Ф6).
# ───────────────────────────────────────────────────────────────────────────
paths:
  /healthz:
    get:
      tags: [System]
      summary: Liveness probe
      description: Возвращает 200, если процесс жив. Не проверяет БД.
      operationId: healthz
      security: []
      responses:
        "200":
          description: Процесс жив
          content:
            text/plain:
              schema:
                type: string
                const: ok

  /readyz:
    get:
      tags: [System]
      summary: Readiness probe
      description: |
        Возвращает 200, если сервис готов принимать трафик (DB ping успешен).
        Используется k8s readiness-probe (R6.3).
      operationId: readyz
      security: []
      responses:
        "200":
          description: Готов
          content:
            text/plain:
              schema:
                type: string
        "503":
          description: Не готов (БД недоступна)
          content:
            text/plain:
              schema:
                type: string

  /metrics:
    get:
      tags: [System]
      summary: Prometheus metrics
      description: Метрики в Prometheus exposition format (R6.5).
      operationId: metrics
      security: []
      responses:
        "200":
          description: Метрики
          content:
            text/plain:
              schema:
                type: string
                description: Prometheus exposition format

  /openapi.json:
    get:
      tags: [System]
      summary: OpenAPI спецификация
      description: |
        Отдаёт текущую OpenAPI 3.1 спецификацию сервиса (R11.4).
        Генерируется из openapi.yaml (может быть embed-нута в бинарник).
      operationId: openapiJson
      security: []
      responses:
        "200":
          description: OpenAPI спецификация
          content:
            application/json:
              schema:
                type: object
                description: OpenAPI 3.1 document

  /docs:
    get:
      tags: [System]
      summary: Интерактивная документация API
      description: Swagger UI с локальными embedded assets загружает актуальную спецификацию из `/openapi.json` (R6.6, R11.4).
      operationId: docs
      security: []
      responses:
        "200":
          description: HTML-страница Swagger UI
          content:
            text/html:
              schema:
                type: string
                description: Swagger UI HTML

  # ─────────────────────────────────────────────────────────────────────────
  # Proxy routes (R8, R11). Payload schemas intentionally stay in upstream SDK.
  # ─────────────────────────────────────────────────────────────────────────
  /v1/chat/completions:
    post:
      tags: [Proxy]
      summary: OpenAI-compatible chat completion
      description: Тело и ответ прозрачно обрабатываются upstream SDK; бизнес-слой описывает только URL, auth и общие ошибки.
      operationId: proxyChatCompletions
      security:
        - BearerApiKey: []
      responses:
        "200":
          description: Upstream-compatible response
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/completions:
    post:
      tags: [Proxy]
      summary: OpenAI-compatible completion
      description: Тело и ответ прозрачно обрабатываются upstream SDK; бизнес-слой описывает только URL, auth и общие ошибки.
      operationId: proxyCompletions
      security:
        - BearerApiKey: []
      responses:
        "200":
          description: Upstream-compatible response
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/images/generations:
    post:
      tags: [Proxy]
      summary: OpenAI-compatible image generation
      description: Тело и ответ прозрачно обрабатываются upstream SDK; бизнес-слой не владеет их схемами.
      operationId: proxyImageGenerations
      security:
        - BearerApiKey: []
      responses:
        "200":
          description: Upstream-compatible response
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/images/edits:
    post:
      tags: [Proxy]
      summary: OpenAI-compatible image edit
      description: Тело и ответ прозрачно обрабатываются upstream SDK; бизнес-слой не владеет их схемами.
      operationId: proxyImageEdits
      security:
        - BearerApiKey: []
      responses:
        "200":
          description: Upstream-compatible response
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/videos:
    post:
      tags: [Proxy]
      summary: xAI-compatible video generation
      description: Alias video generation route, transparently handled by upstream SDK.
      operationId: proxyXAIVideos
      security:
        - BearerApiKey: []
      responses:
        "200":
          description: Upstream-compatible response
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/videos/generations:
    post:
      tags: [Proxy]
      summary: xAI video generation
      description: Тело и ответ прозрачно обрабатываются upstream SDK; бизнес-слой не владеет их схемами.
      operationId: proxyXAIVideoGenerations
      security:
        - BearerApiKey: []
      responses:
        "200":
          description: Upstream-compatible response
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/videos/edits:
    post:
      tags: [Proxy]
      summary: xAI video edit
      description: Тело и ответ прозрачно обрабатываются upstream SDK; бизнес-слой не владеет их схемами.
      operationId: proxyXAIVideoEdits
      security:
        - BearerApiKey: []
      responses:
        "200":
          description: Upstream-compatible response
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/videos/extensions:
    post:
      tags: [Proxy]
      summary: xAI video extension
      description: Тело и ответ прозрачно обрабатываются upstream SDK; бизнес-слой не владеет их схемами.
      operationId: proxyXAIVideoExtensions
      security:
        - BearerApiKey: []
      responses:
        "200":
          description: Upstream-compatible response
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/videos/{request_id}:
    get:
      tags: [Proxy]
      summary: Получить результат xAI video request
      description: Статус и результат video request формируются upstream SDK; локальная response schema не дублируется.
      operationId: proxyXAIVideoRetrieve
      security:
        - BearerApiKey: []
      parameters:
        - name: request_id
          in: path
          required: true
          description: Идентификатор video request, интерпретируемый upstream SDK.
          schema:
            type: string
      responses:
        "200":
          description: Upstream-compatible response
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/messages:
    post:
      tags: [Proxy]
      summary: Anthropic-compatible message
      description: Тело и ответ прозрачно обрабатываются upstream SDK; бизнес-слой не владеет их схемами.
      operationId: proxyMessages
      security:
        - BearerApiKey: []
      responses:
        "200":
          description: Upstream-compatible response
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/messages/count_tokens:
    post:
