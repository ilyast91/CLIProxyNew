# CI pipeline для CLIProxyNew (architecture-principles.md §4 — тест-пирамида).
#
# Запускается на PR и push в main. Порядок: static checks → независимые
# release gates → build.
#
# Ключевой принцип: build/package происходит ТОЛЬКО если все проверки прошли.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Отменяем параллельные запуски того же PR/branch для экономии ресурсов.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.5"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Статические проверки: gofmt, go vet.
  # ─────────────────────────────────────────────────────────────────────────
  static-checks:
    name: Static checks (fmt + vet)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: gofmt
        # Проверяет, что все .go файлы отформатированы через gofmt.
        # Должен вывести 0 строк — иначе fail.
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::Не отформатированы gofmt:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

  # ─────────────────────────────────────────────────────────────────────────
  # Unit, behavioral ADR-9 contracts и консистентность модулей.
  # ─────────────────────────────────────────────────────────────────────────
  unit-contract:
    name: Unit + ADR-9 contracts
    runs-on: ubuntu-latest
    needs: static-checks
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run short race suite
        run: go test -short -race -timeout 5m ./...

      - name: Run behavioral ADR-9 contracts
        run: ./scripts/verify-adr9-contracts.sh

      - name: Check modules tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL integration tests.
  # ─────────────────────────────────────────────────────────────────────────
  integration:
    name: PostgreSQL integration
    runs-on: ubuntu-latest
    needs: static-checks
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run integration tests
        run: go test -run Integration -timeout 10m ./internal/store ./internal/watcher

  # ─────────────────────────────────────────────────────────────────────────
  # Production-like runtime через public SDK и реальный PostgreSQL.
  # ─────────────────────────────────────────────────────────────────────────
  e2e:
    name: SDK runtime E2E
    runs-on: ubuntu-latest
    needs: static-checks
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run runtime E2E
        run: go test -run '^TestIntegrationRuntimeLoginKeyInferenceUsageAdmin$' -timeout 10m ./internal/e2e -v

  # ─────────────────────────────────────────────────────────────────────────
  # Steady-state SLA бизнес-слоя без искажения race instrumentation.
  # ─────────────────────────────────────────────────────────────────────────
  sla:
    name: Load/SLA regression
    runs-on: ubuntu-latest
    needs: static-checks
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run load/SLA gate
        run: go test -count=1 -run '^TestIntegrationRuntimeSLA$' -timeout 10m ./internal/e2e -v

  # ─────────────────────────────────────────────────────────────────────────
  # Aggregate coverage handwritten internal/* code.
  # ─────────────────────────────────────────────────────────────────────────
  coverage:
    name: Coverage (>= 70%)
    runs-on: ubuntu-latest
    needs: static-checks
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run aggregate coverage gate
        run: ./scripts/coverage.sh coverage.out

  # ─────────────────────────────────────────────────────────────────────────
  # Source policy и reachable dependency vulnerabilities.
  # ─────────────────────────────────────────────────────────────────────────
  security:
    name: Security audit
    runs-on: ubuntu-latest
    needs: static-checks
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run source security audit
        run: ./scripts/security-audit.sh

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  # ─────────────────────────────────────────────────────────────────────────
  # Полный race suite, включая PostgreSQL integration и runtime E2E.
  # ─────────────────────────────────────────────────────────────────────────
  full-race:
    name: Full race suite
    runs-on: ubuntu-latest
    needs: static-checks
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run all tests with race detector
        run: go test -race -timeout 15m ./...

  # ─────────────────────────────────────────────────────────────────────────
  # OpenAPI lint: проверка спецификации (R11.5).
  # ─────────────────────────────────────────────────────────────────────────
  openapi-lint:
    name: OpenAPI lint (spectral)
    runs-on: ubuntu-latest
    needs: static-checks
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"

      - name: Install Spectral
        run: npm install -g @stoplight/spectral-cli@6.16.1

      - name: Lint OpenAPI спецификацию
        run: spectral lint -r .spectral.yaml openapi.yaml

      - name: Check embedded OpenAPI document
        run: |
          go generate ./internal/openapi/...
          git diff --exit-code -- internal/openapi/openapi.json internal/openapi/ogen

      - name: Test embedded OpenAPI contract
        run: go test ./internal/openapi

  # ─────────────────────────────────────────────────────────────────────────
  # Сборка разрешена только после всех release gates.
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - unit-contract
      - integration
      - e2e
      - sla
      - coverage
      - security
      - full-race
      - openapi-lint
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build all packages
        run: go build ./...
