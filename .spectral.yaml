# Spectral ruleset для CLIProxyNew OpenAPI 3.1 (R11.5).
#
# Базируется на спектре stoplightio/spectral (npm i -g @stoplight/spectral-cli).
# Запуск: spectral lint openapi.yaml
#
# Использует стандартные правила:
#   - @stoplight/spectral-owasp-ruleset   (security best practices)
extends:
  - spectral:oas
  - spectral:owasp

rules:
  # Обязательные поля на уровне документа.
  oas3-api-servers: error
  info-contact: error
  info-license: off   # лицензия TBD на Ф0

  # Именование.
  operation-operationId: error           # каждый endpoint обязан иметь operationId
  operation-operationId-unique: error
  operation-tags-defined: error

  # Описания.
  operation-description: warn            # желательно описание у каждого endpoint
  operation-summary: error               # summary обязателен (для Swagger UI)

  # Параметры и ответы.
  operation-parameters: error
  oas3-operation-security-defined: error

  # OWASP top-10 для API.
  owasp:api4:2019-string-restricted: warn  # строки с длиной/формат без limit

  # Человеко-читаемые сообщения.
  operation-tag-defined: error
